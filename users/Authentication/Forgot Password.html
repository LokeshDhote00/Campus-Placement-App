<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Placement Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
    }

    .container h2 {
      margin-bottom: 15px;
    }

    .container p {
      font-size: 14px;
      margin-bottom: 20px;
      color: #ddd;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .input-group input::placeholder {
      color: #ddd;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff512f, #dd2476);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .extra {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra a {
      color: #ffd700;
      text-decoration: none;
    }

    .extra a:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .container {
        width: 90%;
      }
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive otp</p>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <button class="btn" type="submit">Send otp</button>
    </form>

    <div class="extra">
      <p><a href="LoginPage.html">Back to Login</a></p>
    </div>
  </div>

</body>
<script>
const form = document.querySelector("form");
const emailInput = document.querySelector("input");

form.addEventListener("submit", sendOtp);

async function sendOtp(event) {
    event.preventDefault();

    const email = emailInput.value;

    const rawResponse = await fetch("http://localhost:4000/auth/send-otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
    });

    const response = await rawResponse.json();

    console.log("SERVER RESPONSE:", response);

    alert(response.message);

    if (response.success) {

        // IMPORTANT FIX
        localStorage.setItem("resetEmail", email);
        localStorage.setItem("otp", response.otp);

        console.log("OTP STORED:", response.otp);

        // FIXED ROUTE NAME
        window.location.href = "VerifyOtp.html";
    }
}
</script>
</html>
