<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TPO Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f1f5f9}

/* SIDEBAR */
.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
position:fixed;
}
.sidebar h2{
margin-bottom:30px;
color:#38bdf8;
}
.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin:12px 0;
padding:10px;
border-radius:8px;
transition:0.3s;
}
.sidebar a:hover,
.sidebar a.active{
background:#334155;
color:white;
}

/* MAIN */
.main{
margin-left:230px;
width:100%;
padding:25px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#38bdf8;
padding:15px 20px;
border-radius:12px;
color:#0f172a;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
margin:20px 0;
flex-wrap:wrap;
}
.card{
flex:1;
min-width:200px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
}
.card h3{
color:#0ea5e9;
}
.card p{
color:#555;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

/* JOB LIST */
.jobs{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
.job{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}
.job:last-child{border:none;}

/* ACTIVITY */
.activity{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
.activity ul{list-style:none;}
.activity li{
padding:10px 0;
border-bottom:1px solid #eee;
}

/* RESPONSIVE */
@media(max-width:900px){
.grid{grid-template-columns:1fr;}
.sidebar{width:180px;}
.main{margin-left:180px;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>TPO Panel</h2>
<a href="TPODashboard.html" class="active">🏠 Dashboard</a>
<a href="Post Job Page.html">💼 Post Job</a>
<a href="View Applications Page.html">📄 Applications</a>
<a href="Student List Page.html">👨‍🎓 Students</a>
<a href="Manage Jobs Page.html">📋 Manage Jobs</a>
<a href="../Authentication/LoginPage.html">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
<h3>Dashboard Overview 🏫</h3>
<span>Welcome, TPO</span>
</div>

<!-- CARDS -->
<!-- CARDS -->
<div class="cards">

<div class="card">
<h3 id="totalJobs">0</h3>
<p>Total Jobs Posted</p>
</div>

<div class="card">
<h3 id="totalApplications">0</h3>
<p>Total Applications</p>
</div>

<div class="card">
<h3 id="totalStudents">0</h3>
<p>Total Students</p>
</div>

<div class="card">
<h3 id="totalCompanies">0</h3>
<p>Companies Visited</p>
</div>

</div>

<!-- GRID -->
<div class="grid">

<!-- JOBS -->
<!-- JOBS -->
<div class="jobs">

<h3>Recent Job Posts</h3>

<div id="recentJobsContainer">

</div>

</div>

<!-- ACTIVITY -->
<!-- ACTIVITY -->
<div class="activity">

<h3>Recent Activity</h3>

<ul id="activityContainer">

</ul>

</div>

</div>

</div>

</body>
<script>

/* ELEMENTS */

const totalJobs =
document.getElementById("totalJobs")

const totalApplications =
document.getElementById("totalApplications")

const totalStudents =
document.getElementById("totalStudents")

const totalCompanies =
document.getElementById("totalCompanies")

const recentJobsContainer =
document.getElementById("recentJobsContainer")

const activityContainer =
document.getElementById("activityContainer")

/* FETCH DASHBOARD */

fetch(
"http://localhost:4000/tpo/dashboard"
)

.then((response)=>response.json())

.then((data)=>{

    console.log(data)

    const dashboard =
    data.dashboardData

    /* CARDS */

    totalJobs.innerText =
    dashboard.totalJobs

    totalApplications.innerText =
    dashboard.totalApplications

    totalStudents.innerText =
    dashboard.totalStudents

    totalCompanies.innerText =
    dashboard.totalCompanies

    /* RECENT JOBS */

    recentJobsContainer.innerHTML = ""

    dashboard.recentJobs.forEach((job)=>{

        recentJobsContainer.innerHTML += `

        <div class="job">

        <span>

        ${job.company_name}
        -
        ${job.role}

        </span>

        <span>

        ${job.package} LPA

        </span>

        </div>

        `

    })

    /* RECENT ACTIVITY */

    activityContainer.innerHTML = ""

    dashboard.activities.forEach((activity)=>{

    let message = ""

    const status =
    activity.status.toLowerCase()

    if(status === "pending"){

        message = `
        ${activity.name}
        applied to
        ${activity.company_name}
        `

    }

    else if(status === "shortlisted"){

        message = `
        ${activity.name}
        shortlisted by
        ${activity.company_name}
        `

    }

    else if(status === "selected"){

        message = `
        ${activity.name}
        selected in
        ${activity.company_name}
        `

    }

    else if(status === "rejected"){

        message = `
        ${activity.name}
        rejected by
        ${activity.company_name}
        `

    }

    activityContainer.innerHTML += `

    <li>

    ${message}

    </li>

    `

})

})

.catch((err)=>{

    console.log(err)

})

</script>
</html>
